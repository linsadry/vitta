<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 400" width="240" height="400">
  <defs>
    <!-- Soft blur for watercolor wash -->
    <filter id="f-wash" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <!-- Medium blur for petals -->
    <filter id="f-petal" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <!-- Light blur for fine details -->
    <filter id="f-fine" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
  </defs>

  <!-- ═══ STEMS ═══ -->
  <g fill="none" stroke="#8A9C7A" stroke-linecap="round">
    <!-- Main tall stem — slight organic curve -->
    <path d="M116,398 C113,368 119,335 114,300 C110,268 116,238 111,200 C107,168 113,142 108,108 C105,82 110,58 106,28" stroke-width="1.3"/>
    <!-- Branch left to sage flower -->
    <path d="M111,200 C100,186 88,172 80,156" stroke-width="1.0"/>
    <!-- Branch right to cream flower -->
    <path d="M110,148 C122,136 135,126 142,112" stroke-width="0.85"/>
    <!-- Tiny twig at top -->
    <path d="M107,75 C114,62 118,52 122,42" stroke-width="0.7"/>
  </g>

  <!-- Wispy grass at base -->
  <g fill="none" stroke="#8A9C7A" stroke-linecap="round" opacity="0.38">
    <path d="M105,398 C101,376 97,354 93,335" stroke-width="0.8"/>
    <path d="M128,398 C132,380 136,360 140,342" stroke-width="0.7"/>
    <path d="M118,398 C121,385 124,368 128,354" stroke-width="0.6"/>
    <path d="M98,398 C94,382 90,366 86,352" stroke-width="0.65"/>
  </g>

  <!-- ═══ LEAVES ═══ -->
  <path d="M111,200 C98,186 92,178 97,170 C102,162 108,176 111,200Z" fill="#7A9878" opacity="0.45"/>
  <path d="M113,240 C125,226 131,218 127,210 C123,202 117,216 113,240Z" fill="#7A9878" opacity="0.38"/>
  <path d="M109,290 C100,279 94,273 97,266 C100,259 106,270 109,290Z" fill="#7A9878" opacity="0.35"/>
  <path d="M110,148 C99,137 93,130 97,123 C101,116 107,129 110,148Z" fill="#7A9878" opacity="0.32" transform="rotate(-8 110 148)"/>
  <path d="M113,330 C122,319 127,313 124,307 C121,301 116,312 113,330Z" fill="#7A9878" opacity="0.28"/>

  <!-- ═══ LARGE PINK FLOWER — main, upper ═══ -->
  <!-- Outer atmospheric wash -->
  <circle cx="106" cy="26" r="50" fill="#EEC4B2" filter="url(#f-wash)" opacity="0.28"/>
  <!-- Petal wash -->
  <g filter="url(#f-petal)" opacity="0.36">
    <ellipse cx="106" cy="26" rx="44" ry="20" fill="#ECC0B0" transform="rotate(0 106 26)"/>
    <ellipse cx="106" cy="26" rx="44" ry="20" fill="#E4B4A4" transform="rotate(45 106 26)"/>
    <ellipse cx="106" cy="26" rx="44" ry="20" fill="#ECC0B0" transform="rotate(90 106 26)"/>
    <ellipse cx="106" cy="26" rx="44" ry="20" fill="#E8BCAC" transform="rotate(135 106 26)"/>
  </g>
  <!-- Petals detail -->
  <g filter="url(#f-fine)" opacity="0.46">
    <ellipse cx="106" cy="26" rx="38" ry="17" fill="#F2CABА" transform="rotate(22.5 106 26)"/>
    <ellipse cx="106" cy="26" rx="38" ry="17" fill="#ECC0AC" transform="rotate(67.5 106 26)"/>
    <ellipse cx="106" cy="26" rx="38" ry="17" fill="#F2CABC" transform="rotate(112.5 106 26)"/>
    <ellipse cx="106" cy="26" rx="38" ry="17" fill="#E8BAA8" transform="rotate(157.5 106 26)"/>
    <ellipse cx="106" cy="26" rx="38" ry="17" fill="#F2CABC" transform="rotate(0 106 26)"/>
    <ellipse cx="106" cy="26" rx="38" ry="17" fill="#ECC0B0" transform="rotate(45 106 26)"/>
    <ellipse cx="106" cy="26" rx="38" ry="17" fill="#F2CABC" transform="rotate(90 106 26)"/>
    <ellipse cx="106" cy="26" rx="38" ry="17" fill="#ECC0AC" transform="rotate(135 106 26)"/>
  </g>
  <!-- Center -->
  <circle cx="106" cy="26" r="17" fill="#D49068" opacity="0.32" filter="url(#f-petal)"/>
  <circle cx="106" cy="26" r="10" fill="#C88840" opacity="0.44" filter="url(#f-fine)"/>
  <circle cx="106" cy="26" r="6" fill="#D4A048" opacity="0.52"/>

  <!-- ═══ SAGE/GREY-GREEN FLOWER — left branch, middle ═══ -->
  <!-- Atmospheric wash -->
  <circle cx="80" cy="156" r="36" fill="#B4C6B2" filter="url(#f-wash)" opacity="0.22"/>
  <!-- Petals -->
  <g filter="url(#f-petal)" opacity="0.32">
    <ellipse cx="80" cy="156" rx="32" ry="14" fill="#BAC8B6" transform="rotate(0 80 156)"/>
    <ellipse cx="80" cy="156" rx="32" ry="14" fill="#AEBCAA" transform="rotate(60 80 156)"/>
    <ellipse cx="80" cy="156" rx="32" ry="14" fill="#BAC8B6" transform="rotate(120 80 156)"/>
  </g>
  <g filter="url(#f-fine)" opacity="0.42">
    <ellipse cx="80" cy="156" rx="27" ry="12" fill="#BED0BA" transform="rotate(30 80 156)"/>
    <ellipse cx="80" cy="156" rx="27" ry="12" fill="#B2C4AE" transform="rotate(90 80 156)"/>
    <ellipse cx="80" cy="156" rx="27" ry="12" fill="#BED0BA" transform="rotate(150 80 156)"/>
    <ellipse cx="80" cy="156" rx="27" ry="12" fill="#B2C4AE" transform="rotate(0 80 156)"/>
    <ellipse cx="80" cy="156" rx="27" ry="12" fill="#BED0BA" transform="rotate(60 80 156)"/>
    <ellipse cx="80" cy="156" rx="27" ry="12" fill="#B8CCB4" transform="rotate(120 80 156)"/>
  </g>
  <circle cx="80" cy="156" r="9" fill="#C89050" opacity="0.28" filter="url(#f-fine)"/>
  <circle cx="80" cy="156" r="5" fill="#D4A040" opacity="0.38"/>

  <!-- ═══ SMALL CREAM/BLUSH FLOWER — right branch ═══ -->
  <g filter="url(#f-petal)" opacity="0.34">
    <ellipse cx="142" cy="112" rx="24" ry="11" fill="#F4DDD0" transform="rotate(20 142 112)"/>
    <ellipse cx="142" cy="112" rx="24" ry="11" fill="#EED5C8" transform="rotate(80 142 112)"/>
    <ellipse cx="142" cy="112" rx="24" ry="11" fill="#F4DDD0" transform="rotate(140 142 112)"/>
    <ellipse cx="142" cy="112" rx="24" ry="11" fill="#E8CEC2" transform="rotate(50 142 112)"/>
    <ellipse cx="142" cy="112" rx="24" ry="11" fill="#F4DDD0" transform="rotate(110 142 112)"/>
    <ellipse cx="142" cy="112" rx="24" ry="11" fill="#EED5C8" transform="rotate(170 142 112)"/>
  </g>
  <circle cx="142" cy="112" r="7" fill="#C89050" opacity="0.26" filter="url(#f-fine)"/>
  <circle cx="142" cy="112" r="4" fill="#D4A048" opacity="0.35"/>

  <!-- ═══ BUD — top twig ═══ -->
  <g filter="url(#f-fine)" opacity="0.40">
    <ellipse cx="122" cy="44" rx="15" ry="7" fill="#F0C8B8" transform="rotate(-28 122 44)"/>
    <ellipse cx="122" cy="44" rx="10" ry="5" fill="#EABEB0" transform="rotate(8 122 44)"/>
  </g>

  <!-- ═══ ATMOSPHERIC SCATTER ═══ -->
  <circle cx="66" cy="108" r="2.5" fill="#ECC0B0" opacity="0.20"/>
  <circle cx="160" cy="82" r="2" fill="#F2CABC" opacity="0.16"/>
  <circle cx="150" cy="170" r="2" fill="#BACCB8" opacity="0.18"/>
  <circle cx="63" cy="200" r="1.5" fill="#ECC0B0" opacity="0.16"/>
  <circle cx="172" cy="135" r="1.5" fill="#F4DDD0" opacity="0.14"/>
  <circle cx="52" cy="165" r="2" fill="#B8CCB4" opacity="0.16"/>
  <circle cx="88" cy="50" r="2" fill="#F2CABC" opacity="0.18"/>
  <circle cx="165" cy="60" r="1.5" fill="#ECC0B0" opacity="0.12"/>
</svg>
